<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fafafa;
            overflow-x: hidden;
            color: #2a2a2a;
        }

        /* Flores PNG nos cantos - FIXAS NO DOCUMENTO (não acompanham scroll) */
        .flower-decoration {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            animation: flowerFadeIn 2s ease-out forwards;
        }

        .flower-decoration img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.06));
        }

        /* Posições das flores - BEM NOS CANTOS E DISCRETAS */
        
        /* TOPO ESQUERDO */
        .flower-top-left {
            top: 0;
            left: 0;
            width: 200px;
            height: 200px;
            animation-delay: 0.5s;
            transform-origin: top left;
        }

        /* TOPO DIREITO */
        .flower-top-right {
            top: 0;
            right: 0;
            width: 200px;
            height: 200px;
            animation-delay: 1s;
            transform-origin: top right;
        }

        /* RODAPÉ ESQUERDO */
        .flower-bottom-left {
            bottom: 0;
            left: 0;
            width: 220px;
            height: 220px;
            animation-delay: 1.5s;
            transform-origin: bottom left;
        }

        /* RODAPÉ DIREITO */
        .flower-bottom-right {
            bottom: 0;
            right: 0;
            width: 220px;
            height: 220px;
            animation-delay: 2s;
            transform-origin: bottom right;
        }

        @keyframes flowerFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
        }

        /* Animações suaves de flutuação */
        .flower-top-left {
            animation: flowerFadeIn 2s ease-out forwards, flowerFloat1 10s ease-in-out infinite 2s;
        }

        .flower-top-right {
            animation: flowerFadeIn 2s ease-out forwards, flowerFloat2 11s ease-in-out infinite 2.5s;
        }

        .flower-bottom-left {
            animation: flowerFadeIn 2s ease-out forwards, flowerFloat1 12s ease-in-out infinite 3s;
        }

        .flower-bottom-right {
            animation: flowerFadeIn 2s ease-out forwards, flowerFloat2 10.5s ease-in-out infinite 3.5s;
        }

        @keyframes flowerFloat1 {
            0%, 100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.03) rotate(2deg);
            }
        }

        @keyframes flowerFloat2 {
            0%, 100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.03) rotate(-2deg);
            }
        }

        /* Responsivo - flores menores em mobile */
        @media (max-width: 768px) {
            .flower-top-left,
            .flower-top-right {
                width: 140px !important;
                height: 140px !important;
            }

            .flower-bottom-left,
            .flower-bottom-right {
                width: 150px !important;
                height: 150px !important;
            }
        }

        @media (max-width: 480px) {
            .flower-top-left,
            .flower-top-right {
                width: 110px !important;
                height: 110px !important;
            }

            .flower-bottom-left,
            .flower-bottom-right {
                width: 120px !important;
                height: 120px !important;
            }
        }

        /* Elementos abstratos decorativos */
        .abstract-line {
            position: fixed;
            pointer-events: none;
            z-index: 5;
        }

        .line-1 {
            top: 10%;
            left: 5%;
            width: 1px;
            height: 200px;
            background: linear-gradient(to bottom, transparent, rgba(180, 150, 130, 0.15), transparent);
            animation: lineFloat 8s ease-in-out infinite;
        }

        .line-2 {
            top: 20%;
            right: 8%;
            width: 150px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(180, 150, 130, 0.15), transparent);
            animation: lineFloat 10s ease-in-out infinite 1s;
        }

        .line-3 {
            bottom: 15%;
            left: 3%;
            width: 180px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(180, 150, 130, 0.12), transparent);
            animation: lineFloat 9s ease-in-out infinite 2s;
        }

        .line-4 {
            bottom: 25%;
            right: 5%;
            width: 1px;
            height: 160px;
            background: linear-gradient(to bottom, transparent, rgba(180, 150, 130, 0.12), transparent);
            animation: lineFloat 11s ease-in-out infinite 1.5s;
        }

        .line-5 {
            top: 50%;
            left: 2%;
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(180, 150, 130, 0.1), transparent);
            animation: lineFloat 7s ease-in-out infinite 3s;
            transform: rotate(30deg);
        }

        .line-6 {
            top: 60%;
            right: 3%;
            width: 120px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(180, 150, 130, 0.1), transparent);
            animation: lineFloat 8.5s ease-in-out infinite 2.5s;
            transform: rotate(-25deg);
        }

        @keyframes lineFloat {
            0%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            50% {
                opacity: 0.6;
                transform: translateY(-15px);
            }
        }

        /* Navegação lateral - visível sempre */
        .nav-line {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        .nav-path {
            width: 1px;
            height: 200px;
            background: linear-gradient(to bottom, 
                rgba(180, 150, 130, 0) 0%,
                rgba(180, 150, 130, 0.3) 20%,
                rgba(180, 150, 130, 0.3) 80%,
                rgba(180, 150, 130, 0) 100%
            );
            position: relative;
        }

        .nav-dot {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: transparent;
            border: 1px solid #b49682;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .nav-dot.active {
            background: #b49682;
            box-shadow: 0 0 0 4px rgba(180, 150, 130, 0.15);
        }

        .nav-dot:hover {
            transform: translateX(-50%) scale(1.3);
        }

        /* Container principal */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: 60px 0;
        }

        /* Monograma AD */
        .monogram {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            opacity: 0;
            animation: fadeInScale 1.2s ease-out 0.3s forwards;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Save the Date - mais marcante */
        .save-text {
            font-family: 'Cormorant', serif;
            font-size: 2.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #b49682;
            font-weight: 400;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.6s forwards;
        }

        .name-container {
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.9s forwards;
        }

        .name {
            font-family: 'Cormorant', serif;
            font-size: 4rem;
            font-weight: 300;
            color: #2a2a2a;
            letter-spacing: 3px;
            display: inline;
        }

        .age {
            font-family: 'Cormorant', serif;
            font-size: 4rem;
            font-weight: 300;
            color: #b49682;
            display: inline;
            margin-left: 15px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Contador */
        .countdown-section {
            margin-top: 60px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.2s forwards;
        }

        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
        }

        .time-block {
            text-align: center;
        }

        .time-number {
            font-family: 'Cormorant', serif;
            font-size: 3.5rem;
            font-weight: 300;
            color: #2a2a2a;
            line-height: 1;
            display: block;
            margin-bottom: 8px;
        }

        .time-label {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #b49682;
            font-weight: 300;
        }

        .divider {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, 
                rgba(180, 150, 130, 0),
                rgba(180, 150, 130, 0.3),
                rgba(180, 150, 130, 0)
            );
            margin: 40px auto;
        }

        /* Sections */
        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1.2s ease-out;
            padding: 80px 0;
        }

        section.visible {
            opacity: 1;
        }

        .section-content {
            max-width: 600px;
            text-align: center;
            width: 100%;
        }

        .section-title {
            font-family: 'Cormorant', serif;
            font-size: 2.5rem;
            font-weight: 300;
            color: #2a2a2a;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .info-grid {
            display: grid;
            gap: 25px;
            text-align: left;
            margin-top: 40px;
        }

        .info-item {
            border-bottom: 0.5px solid rgba(180, 150, 130, 0.2);
            padding-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .info-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #b49682;
            font-weight: 300;
        }

        .info-value {
            font-family: 'Cormorant', serif;
            font-size: 1.3rem;
            color: #2a2a2a;
            font-weight: 400;
            text-align: right;
        }

        .location-link {
            color: #b49682;
            text-decoration: none;
            border-bottom: 0.5px solid #b49682;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .location-link:hover {
            color: #8a7355;
            border-bottom-color: #8a7355;
        }

        /* Botão RSVP */
        .rsvp-button {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 50px;
            border: 0.5px solid #b49682;
            background: transparent;
            color: #b49682;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            font-weight: 300;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .rsvp-button:hover {
            background: #b49682;
            color: #fafafa;
        }

        /* Formulário */
        .form-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(250, 250, 250, 0.98);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .form-overlay.active {
            display: flex;
            opacity: 1;
        }

        .form-container {
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 60px 40px;
            position: relative;
        }

        .close-form {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 24px;
            color: #b49682;
            cursor: pointer;
            border: none;
            background: none;
            line-height: 1;
            font-weight: 200;
        }

        .form-title {
            font-family: 'Cormorant', serif;
            font-size: 2rem;
            font-weight: 300;
            text-align: center;
            margin-bottom: 40px;
            color: #2a2a2a;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #b49682;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 0.5px solid rgba(180, 150, 130, 0.3);
            background: transparent;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            color: #2a2a2a;
            font-weight: 300;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-bottom-color: #b49682;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            padding-top: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: 0.5px solid #b49682;
            background: transparent;
            color: #b49682;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 30px;
            font-weight: 300;
            transition: all 0.4s ease;
        }

        .submit-btn:hover {
            background: #b49682;
            color: #fafafa;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .save-text {
                font-size: 1.8rem;
                letter-spacing: 5px;
            }

            .name {
                font-size: 2.8rem;
            }

            .age {
                font-size: 2.8rem;
                display: block;
                margin-left: 0;
                margin-top: 5px;
            }

            .section-title {
                font-size: 2rem;
            }

            .countdown-wrapper {
                gap: 25px;
            }

            .time-number {
                font-size: 2.8rem;
            }

            .form-container {
                padding: 40px 20px;
            }

            .info-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .info-value {
                text-align: left;
            }

            .nav-line {
                right: 15px;
            }
        }

        @media (max-width: 480px) {
            .save-text {
                font-size: 1.5rem;
                letter-spacing: 3px;
            }

            .name {
                font-size: 2.2rem;
            }

            .age {
                font-size: 2.2rem;
            }

            .countdown-wrapper {
                gap: 15px;
                flex-wrap: wrap;
            }

            .time-number {
                font-size: 2.2rem;
            }

            .section-title {
                font-size: 1.8rem;
            }

            .monogram {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>
    <!-- 
    ═══════════════════════════════════════════════════════════════
    FLORES PNG - 4 CANTOS (discretas e fixas no documento)
    ═══════════════════════════════════════════════════════════════
    
    INSTRUÇÕES:
    1. Salve 4 imagens PNG de flores com fundo transparente na pasta
    2. Nomeie os arquivos como:
       - flor1.png (canto superior esquerdo)
       - flor2.png (canto superior direito)
       - flor3.png (canto inferior esquerdo)
       - flor4.png (canto inferior direito)
    
    As flores ficarão BEM nos cantos, discretas (40% opacidade)
    Elas NÃO acompanham o scroll - ficam fixas no documento
    
    ═══════════════════════════════════════════════════════════════
    -->
    
    <!-- Canto Superior Esquerdo -->
    <div class="flower-decoration flower-top-left">
        <img src="flor1.png" alt="">
    </div>

    <!-- Canto Superior Direito -->
    <div class="flower-decoration flower-top-right">
        <img src="flor2.png" alt="">
    </div>

    <!-- Canto Inferior Esquerdo -->
    <div class="flower-decoration flower-bottom-left">
        <img src="flor3.png" alt="">
    </div>

    <!-- Canto Inferior Direito -->
    <div class="flower-decoration flower-bottom-right">
        <img src="flor4.png" alt="">
    </div>

    <!-- Elementos abstratos decorativos -->
    <div class="abstract-line line-1"></div>
    <div class="abstract-line line-2"></div>
    <div class="abstract-line line-3"></div>
    <div class="abstract-line line-4"></div>
    <div class="abstract-line line-5"></div>
    <div class="abstract-line line-6"></div>

    <!-- Navegação lateral -->
    <div class="nav-line">
        <div class="nav-path">
            <div class="nav-dot active" style="top: 0" data-target="hero"></div>
            <div class="nav-dot" style="top: 50%" data-target="info"></div>
            <div class="nav-dot" style="top: 100%" data-target="rsvp"></div>
        </div>
    </div>

    <!-- Hero Section -->
    <section id="hero" class="hero visible">
        <div class="container">
            <!-- Logo SVG - ADICIONE SEU ARQUIVO AQUI -->
            <div class="logo-container">
                <!-- 
                    INSTRUÇÕES PARA O LOGO:
                    1. Cole seu arquivo SVG completo aqui dentro
                    2. Remova este comentário
                    
                    O SVG deve começar com <svg> e terminar com </svg>
                    Exemplo do que você vai colar:
                    
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="..."/>
                        <circle cx="..." cy="..." r="..."/>
                    </svg>
                    
                    Arquivo esperado: logo.svg (salve na mesma pasta)
                -->
            </div>

            <div class="save-text">Save the Date</div>
            
            <div class="name-container">
                <h1 class="name">Antonella Ditadi</h1>
                <span class="age">15 anos</span>
            </div>

            <div class="countdown-section">
                <div class="countdown-wrapper">
                    <div class="time-block">
                        <span class="time-number" id="days">000</span>
                        <span class="time-label">Dias</span>
                    </div>
                    <div class="time-block">
                        <span class="time-number" id="hours">00</span>
                        <span class="time-label">Horas</span>
                    </div>
                    <div class="time-block">
                        <span class="time-number" id="minutes">00</span>
                        <span class="time-label">Minutos</span>
                    </div>
                    <div class="time-block">
                        <span class="time-number" id="seconds">00</span>
                        <span class="time-label">Segundos</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Informações Section -->
    <section id="info">
        <div class="container">
            <div class="section-content">
                <h2 class="section-title">Informações</h2>
                <div class="divider"></div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Data</span>
                        <span class="info-value">12 de Setembro, 2026</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Horário</span>
                        <span class="info-value">19h30</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Local</span>
                        <a href="https://www.google.com/maps/search/?api=1&query=Casa+Olivo+1033" 
                           target="_blank" 
                           rel="noopener noreferrer" 
                           class="info-value location-link">
                            Casa Olivo 1033
                            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M10 6.5V10C10 10.55 9.55 11 9 11H2C1.45 11 1 10.55 1 10V3C1 2.45 1.45 2 2 2H5.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                                <path d="M7 1H11V5" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M5 7L11 1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- RSVP Section -->
    <section id="rsvp">
        <div class="container">
            <div class="section-content">
                <h2 class="section-title">Confirme sua presença</h2>
                <div class="divider"></div>
                <button class="rsvp-button" onclick="openForm()">Confirmar presença</button>
            </div>
        </div>
    </section>

    <!-- Form Overlay -->
    <div class="form-overlay" id="formOverlay">
        <div class="form-container">
            <button class="close-form" onclick="closeForm()">×</button>
            <h2 class="form-title">Confirme sua presença</h2>
            
            <form action="https://formspree.io/f/mqakbzdz" method="POST">
                <div class="form-group">
                    <label for="name">Nome completo</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="attendance">Confirmação</label>
                    <select id="attendance" name="attendance" required>
                        <option value="">Selecione</option>
                        <option value="yes">Confirmo presença</option>
                        <option value="no">Não poderei comparecer</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Mensagem (opcional)</label>
                    <textarea id="message" name="message" placeholder="Deixe uma mensagem especial..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Enviar confirmação</button>
            </form>
        </div>
    </div>

    <script>
        // Contador
        const eventDate = new Date('2026-09-12T19:30:00').getTime();
        
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = eventDate - now;
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            document.getElementById('days').textContent = String(days).padStart(3, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }
        
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // Scroll reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('section').forEach(section => {
            observer.observe(section);
        });

        // Navegação
        document.querySelectorAll('.nav-dot').forEach(dot => {
            dot.addEventListener('click', function() {
                const target = this.dataset.target;
                document.getElementById(target).scrollIntoView({ behavior: 'smooth' });
                
                document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Atualizar nav dots no scroll
        window.addEventListener('scroll', () => {
            const sections = ['hero', 'info', 'rsvp'];
            const scrollPos = window.scrollY + window.innerHeight / 2;
            
            sections.forEach((section, index) => {
                const element = document.getElementById(section);
                if (element.offsetTop <= scrollPos && element.offsetTop + element.offsetHeight > scrollPos) {
                    document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
                    document.querySelectorAll('.nav-dot')[index].classList.add('active');
                }
            });
        });

        // Form
        function openForm() {
            document.getElementById('formOverlay').classList.add('active');
        }

        function closeForm() {
            document.getElementById('formOverlay').classList.remove('active');
        }

        // Fechar form com ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeForm();
            }
        });
    </script>
</body>
</html>
