<script>
    // Contador
    const eventDate = new Date('2026-09-12T19:30:00').getTime();
    
    function updateCountdown() {
        const now = new Date().getTime();
        const distance = eventDate - now;
        
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        
        document.getElementById('days').textContent = String(days).padStart(3, '0');
        document.getElementById('hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
        document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }
    
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.3 });

    document.querySelectorAll('section').forEach(section => {
        observer.observe(section);
    });

    // Navegação
    document.querySelectorAll('.nav-dot').forEach(dot => {
        dot.addEventListener('click', function() {
            const target = this.dataset.target;
            document.getElementById(target).scrollIntoView({ behavior: 'smooth' });
            
            document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
            this.classList.add('active');
        });
    });

    // Atualizar nav dots no scroll
    window.addEventListener('scroll', () => {
        const sections = ['hero', 'info', 'rsvp'];
        const scrollPos = window.scrollY + window.innerHeight / 2;
        
        sections.forEach((section, index) => {
            const element = document.getElementById(section);
            if (element.offsetTop <= scrollPos && element.offsetTop + element.offsetHeight > scrollPos) {
                document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
                document.querySelectorAll('.nav-dot')[index].classList.add('active');
            }
        });
    });

    // Form
    function openForm() {
        document.getElementById('formOverlay').classList.add('active');
    }

    function closeForm() {
        document.getElementById('formOverlay').classList.remove('active');
    }

    // Fechar form com ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeForm();
        }
    });
</script>
